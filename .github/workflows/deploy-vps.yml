name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.4.111
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            cd /var/www/neumaticos
            git pull origin main
            systemctl restart giorda.service
            echo "Deploy completado: $(date)"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_Qw2JNWodrJ5Uv7ZvFpaKqSOa
          VERCEL_PROJECT_ID: prj_qS0gcmAYNdrI1wXvNJOCH5zZM8KU
